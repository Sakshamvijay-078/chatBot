# render.yaml — Penda monorepo deployment configuration
#
# Render reads this file to know how to build and run each service.
# System packages listed under `packages` are installed via apt-get
# with root access BEFORE the buildCommand runs — this is the correct
# way to install OS-level dependencies on Render (not inside buildCommand).

services:
  - type: web
    name: penda-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    # Use 1 uvicorn worker on the free-tier instance (512 MB RAM).
    # Multiple workers each load the full model + LangGraph graph into RAM,
    # which easily exceeds the free-tier limit and triggers OOM restarts.
    # A single async worker handles concurrent requests fine via the event loop.
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT --workers 1 --loop asyncio
    plan: free

    # System packages installed by Render before pip (requires root — do NOT
    # put apt-get in buildCommand, it will fail with permission denied).
    packages:
      - tesseract-ocr      # required by pytesseract (§3B OCR fallback)
      - poppler-utils      # required by pdf2image   (§3B OCR fallback)

    envVars:
      - key: GROQ_API_KEY
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: SUPABASE_JWT_SECRET
        sync: false
      - key: BYOK_ENCRYPTION_KEY
        sync: false
      - key: FRONTEND_URL
        sync: false
      - key: ALLOWED_ORIGINS
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false           # Optional — only needed for RAG/pgvector embeddings
      - key: LOG_LEVEL
        value: INFO
      - key: RENDER_EXTERNAL_URL
        sync: false  # Set this to your Render backend URL, e.g. https://penda-backend.onrender.com
      # Python GC tuning for low-memory environments.
      # Reduce the threshold at which GC runs to avoid large heap buildups.
      - key: PYTHONGC
        value: "700,10,10"
      # Disable Python's hash randomization for reproducible caching behaviour
      # (harmless for this workload, helps lru_cache be more predictable)
      - key: PYTHONHASHSEED
        value: "0"
